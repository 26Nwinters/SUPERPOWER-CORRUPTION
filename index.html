<!DOCTYPE html>
<html>
<head><title>CSV Test</title></head>
<body>
<h2>CSV Import Test</h2>
<input type="file" id="fileInput" accept=".csv">
<pre id="output">No file loaded yet</pre>

<script>
  document.getElementById('fileInput').addEventListener('change', function(e) {
    alert('Change event fired!');
    const file = e.target.files[0];
    if (!file) { alert('No file'); return; }
    alert('File selected: ' + file.name);

    const reader = new FileReader();
    reader.onload = function(e) {
      alert('File read successfully!');
      document.getElementById('output').textContent = e.target.result;
    };
    reader.onerror = function() {
      alert('FileReader error: ' + reader.error);
    };
    reader.readAsText(file);
  });
</script>
</body>
</html>
